// ─── API ──────────────────────────────────────────────────────────────────────
async function claude(system, user, onChunk) {
  const key = window.__ALMA_KEY__;
  if (!key) throw new Error("API key no configurada — ingresa tu clave Anthropic en el panel superior");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","x-api-key":key,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1800, system, messages:[{role:"user",content:user}], stream:true }),
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const reader = res.body.getReader(); const dec = new TextDecoder(); let full="";
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    for(const line of dec.decode(value).split("\n")){
      if(line.startsWith("data: ")&&line!=="data: [DONE]"){
        try{ const t=JSON.parse(line.slice(6))?.delta?.text; if(t){full+=t;onChunk(full);} }catch{}
      }
    }
  }
  return full;
}

// ─── SHARED CONTEXT BUILDER ───────────────────────────────────────────────────
function buildContext(biz, local) {
  const L = biz.locales[local];
  const fin = biz.finanzas[local];
  const rrhh = biz.rrhh[local];
  const ops = biz.operaciones[local];
  const legal = biz.legal[local];
  const est = biz.estrategia[local];
  const lines = [`EMPRESA: Inversiones Alma SpA | LOCAL: ${local==="almibar"?"Almíbar (Bar, Curicó)":"Pangoa (Restaurante Peruano, Talca)"}`];
  const add = (label, obj) => { const vals=Object.entries(obj).filter(([,v])=>v?.toString().trim()); if(vals.length) { lines.push(`\n[${label}]`); vals.forEach(([k,v])=>lines.push(`${k}: ${v}`)); }};
  add("PERFIL DEL LOCAL", L);
  add("FINANZAS", fin);
  add("RRHH", rrhh);
  add("OPERACIONES", ops);
  add("LEGAL", legal);
  add("ESTRATEGIA", est);
  return lines.join("\n");
}

function countFilled(obj) { return Object.values(obj||{}).filter(v=>v?.toString().trim()).length; }
function totalFields(obj) { return Object.keys(obj||{}).length; }

// ─── SHARED UI ────────────────────────────────────────────────────────────────
function AIBox({ text, loading, placeholder, onCopy }) {
  const [copied,setCopied]=useState(false);
  const copy=()=>{ if(!text) return; navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),1500); };
  return (
    <div className={`ai-box ${loading?"loading":""}`}>
      {!text&&!loading&&<span style={{color:C.muted,fontStyle:"italic"}}>{placeholder||"El análisis aparecerá aquí..."}</span>}
      {loading&&!text&&<div style={{display:"flex",alignItems:"center",gap:10,color:C.muted}}><div className="spinner"/><span>Analizando con IA...</span></div>}
      {text&&<span>{text}{loading&&<span style={{color:C.blueLight,animation:"pulse 1s infinite"}}>▋</span>}</span>}
      {text&&!loading&&<button className="copy-btn" onClick={copy}>{copied?"✓ copiado":"copiar"}</button>}
    </div>
  );
}

function ModTabs({ tabs, active, onChange }) {
  return (
    <div style={{display:"flex",gap:4,background:C.bg,padding:4,borderRadius:24,border:`1px solid ${C.border}`,marginBottom:20,width:"fit-content"}}>
      {tabs.map(t=><button key={t.id} className={`mod-tab ${active===t.id?"active":""}`} onClick={()=>onChange(t.id)}>{t.icon} {t.label}</button>)}
    </div>
  );
}

function DataGrid({ fields, data, onChange, cols=2 }) {
  return (
    <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:14}}>
      {fields.map(f=>(
        <div key={f.key} style={{gridColumn:f.full?"span 2":"span 1"}}>
          <label className="label">{f.label}</label>
          {f.type==="select"
            ? <select className="select" value={data[f.key]||""} onChange={e=>onChange(f.key,e.target.value)}>
                <option value="">—</option>
                {f.options.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            : f.rows
              ? <textarea className="input" rows={f.rows} placeholder={f.placeholder||""} value={data[f.key]||""} onChange={e=>onChange(f.key,e.target.value)}/>
              : <input className="input" type={f.type||"text"} placeholder={f.placeholder||""} value={data[f.key]||""} onChange={e=>onChange(f.key,e.target.value)}/>
          }
        </div>
      ))}
    </div>
  );
}

function Completeness({ data, label }) {
  const filled=countFilled(data); const total=totalFields(data); const pct=total?Math.round(filled/total*100):0;
  return (
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <div style={{flex:1}}>
        <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
      </div>
      <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{filled}/{total} campos · {pct}%</span>
    </div>
  );
}

function KpiCard({ icon, label, value, sub, trend, color="#1A3A8A" }) {
  return (
    <div className="kpi-card">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:20}}>{icon}</span>
        {trend&&<span style={{fontSize:11,fontWeight:700,color:trend>0?C.success:C.danger}}>{trend>0?"+":""}{trend}%</span>}
      </div>
      <div style={{fontSize:22,fontWeight:700,color,marginBottom:2}}>{value||"—"}</div>
      <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:2}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:C.muted}}>{sub}</div>}
    </div>
  );
}

function SectionHeader({ icon, title, children }) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div className="section-title" style={{marginBottom:0}}>

        <h3 style={{fontSize:15,fontWeight:700,color:C.text}}>{title}</h3>
      </div>
      {children}
    </div>
  );
}

// ─── MODULE: CEO DASHBOARD ────────────────────────────────────────────────────
function ModuleCEO({ biz, local }) {
  const [output,setOutput]=useState(""); const [loading,setLoading]=useState(false);
  const [subTab,setSubTab]=useState("vision");

  const analyze = async (tipo) => {
    setLoading(true); setOutput("");
    const ctx = buildContext(biz, local);
    const sys = `Eres el asesor ejecutivo de confianza del CEO de un negocio gastronómico chileno. Ves el panorama completo: finanzas, personas, operaciones, marketing y estrategia. Eres directo, honesto y priorizas lo que realmente importa. Siempre en español.`;
    const prompts = {
      vision:`Analiza el estado general del negocio y dame una visión ejecutiva completa.\n\n${ctx}\n\nDame:\n1. 🔴 ALERTAS CRÍTICAS: Lo que requiere atención inmediata (si las hay)\n2. 🟡 PUNTOS DE MEJORA: Áreas con oportunidad clara\n3. 🟢 FORTALEZAS: Lo que está funcionando bien\n4. 🎯 TOP 3 PRIORIDADES ESTA SEMANA: Las acciones de mayor impacto\n5. 📊 DIAGNÓSTICO GENERAL: Estado del negocio en una escala 1-10 con justificación`,
      decisiones:`Basado en el contexto del negocio, ayúdame a tomar decisiones clave.\n\n${ctx}\n\nIdentifica:\n1. Las 3 DECISIONES MÁS URGENTES que el CEO debe tomar ahora\n2. Para cada decisión: opciones posibles, pros/contras, y tu recomendación\n3. RIESGOS actuales que podrían escalar si no se actúa\n4. Una decisión que se está postergando y no debería`,
      oportunidades:`Identifica las mejores oportunidades de crecimiento.\n\n${ctx}\n\nDame:\n1. TOP 3 OPORTUNIDADES DE INGRESOS inmediatas (este mes)\n2. TOP 3 OPORTUNIDADES DE REDUCCIÓN DE COSTOS\n3. Una oportunidad de mediano plazo (3-6 meses) que vale la pena planificar\n4. Qué debería DEJAR DE HACER el negocio para liberar recursos`,
    };
    try { await claude(sys, prompts[tipo]||prompts.vision, t=>setOutput(t)); }
    catch { setOutput("Error al conectar. Intenta nuevamente."); }
    setLoading(false);
  };

  const fin=biz.finanzas[local]; const rrhh=biz.rrhh[local];
  const ops=biz.operaciones[local];

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* KPI summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        <KpiCard icon="💰" label="Ventas Mensuales" value={fin.ventasMensual?`$${Number(fin.ventasMensual).toLocaleString("es-CL")}`:null} sub="CLP / mes"/>
        <KpiCard icon="🎫" label="Ticket Promedio" value={fin.ticketPromedio?`$${Number(fin.ticketPromedio).toLocaleString("es-CL")}`:null} sub="por servicio"/>
        <KpiCard icon="👥" label="Equipo" value={rrhh.cantEmpleados?`${rrhh.cantEmpleados} personas`:null} sub={rrhh.tipoContratos||"—"}/>
        <KpiCard icon="🪑" label="Capacidad" value={ops.capacidadMesas?`${ops.capacidadMesas} mesas`:null} sub={ops.clientesDia?`~${ops.clientesDia} clientes/día`:"—"}/>
      </div>

      <ModTabs tabs={[{id:"vision",icon:"🔭",label:"Visión Ejecutiva"},{id:"decisiones",icon:"⚡",label:"Decisiones Clave"},{id:"oportunidades",icon:"🚀",label:"Oportunidades"}]} active={subTab} onChange={setSubTab}/>

      <div className="card">
        <SectionHeader icon="🤖" title="Análisis CEO con IA">
          <button className="btn-primary" onClick={()=>analyze(subTab)} disabled={loading}>
            {loading?<><div className="spinner"/>Analizando...</>:<>Generar Análisis</>}
          </button>
        </SectionHeader>
        <p style={{fontSize:12,color:C.muted,marginBottom:14}}>La IA analiza todos los datos ingresados en todos los módulos para darte una visión integrada.</p>
        <AIBox text={output} loading={loading} placeholder="Ingresa datos en los módulos (Finanzas, RRHH, Operaciones…) para obtener un análisis ejecutivo real y preciso."/>
      </div>

      {/* Completeness overview */}
      <div className="card">
        <SectionHeader icon="📋" title="Completitud de Datos"/>

function ModuleFinanzas({ biz, local, updateBiz }) {
  const data=biz.finanzas[local];
  const set=(k,v)=>updateBiz("finanzas",local,k,v);
  const [subTab,setSubTab]=useState("datos");
  const [output,setOutput]=useState(""); const [loading,setLoading]=useState(false);
  const [saved,setSaved]=useState(false);

  const fields=[
    {key:"ventasMensual",label:"Ventas mensuales (CLP)",type:"number",placeholder:"Ej: 4500000"},
    {key:"ventasPromDia",label:"Ventas promedio día (CLP)",type:"number",placeholder:"Ej: 180000"},
    {key:"ticketPromedio",label:"Ticket promedio (CLP)",type:"number",placeholder:"Ej: 12000"},
    {key:"costoVentas",label:"Costo de ventas %",type:"number",placeholder:"Ej: 30"},
    {key:"costosOperacionales",label:"Costos operacionales/mes",type:"number",placeholder:"Ej: 800000"},
    {key:"sueldos",label:"Total sueldos/mes (CLP)",type:"number",placeholder:"Ej: 2200000"},
    {key:"arriendoServicios",label:"Arriendo + servicios/mes",type:"number",placeholder:"Ej: 650000"},
    {key:"margenEstimado",label:"Margen estimado %",type:"number",placeholder:"Ej: 18"},
    {key:"deudas",label:"Deudas o créditos activos",placeholder:"Ej: Crédito BCI $2M a 12 meses"},
    {key:"flujoCaja",label:"Situación flujo de caja",type:"select",options:["Holgado","Normal","Ajustado","Crítico"]},
    {key:"mesesCriticos",label:"Meses de baja venta",placeholder:"Ej: julio, agosto"},
    {key:"metaVentas",label:"Meta de ventas mensual",type:"number",placeholder:"Ej: 6000000"},
    {key:"principalGasto",label:"Principal gasto",placeholder:"Ej: Sueldos (45% del total)"},
    {key:"principalIngreso",label:"Principal fuente de ingreso",placeholder:"Ej: Cenas viernes y sábado"},
  ];

  const analyze = async (tipo) => {
    setLoading(true); setOutput("");
    const ctx=buildContext(biz,local);
    const sys=`Eres CFO/asesor financiero de negocios gastronómicos chilenos. Conoces bien la operación de restaurantes y bares: costos de insumos, márgenes típicos, impuestos (IVA 19%, PPM), BCI y Mercado Pago. Siempre en español.`;
    const prompts={
      diagnostico:`Analiza la situación financiera completa.\nCONTEXTO:\n${ctx}\n\n1. SEMÁFORO FINANCIERO: Verde/Amarillo/Rojo con justificación\n2. ANÁLISIS DE MÁRGENES: ¿Están sanos? Comparación con benchmarks del rubro\n3. PRINCIPALES RIESGOS FINANCIEROS\n4. OPORTUNIDADES DE MEJORA DE RENTABILIDAD\n5. RECOMENDACIONES INMEDIATAS (esta semana)`,
      flujo:`Analiza el flujo de caja y liquidez.\nCONTEXTO:\n${ctx}\n\n1. DIAGNÓSTICO DE LIQUIDEZ actual\n2. PROYECCIÓN de los próximos 3 meses (considerando meses críticos si los hay)\n3. ESTRATEGIAS para mejorar el flujo de caja\n4. ALERTAS de liquidez que debo monitorear`,
      precios:`Ayúdame a definir y optimizar precios.\nCONTEXTO:\n${ctx}\n\n1. ¿LOS PRECIOS ACTUALES son sostenibles dado el margen?\n2. ANÁLISIS DE PUNTO DE EQUILIBRIO estimado\n3. RECOMENDACIÓN DE AJUSTE DE PRECIOS\n4. ESTRATEGIAS DE REVENUE MANAGEMENT para el tipo de negocio`,
    };
    try { await claude(sys,prompts[tipo]||prompts.diagnostico,t=>setOutput(t)); }
    catch { setOutput("Error al conectar."); }
    setLoading(false);
  };

  const ventasNum=Number(data.ventasMensual||0);
  const sueldosNum=Number(data.sueldos||0);
  const costosOp=Number(data.costosOperacionales||0);
  const arriendo=Number(data.arriendoServicios||0);
  const costoVtasPct=Number(data.costoVentas||0)/100;
  const costoVtas=ventasNum*costoVtasPct;
  const totalCostos=sueldosNum+costosOp+arriendo+costoVtas;
  const utilidad=ventasNum-totalCostos;
  const margenReal=ventasNum>0?Math.round(utilidad/ventasNum*100):null;

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:20}}>
      <ModTabs tabs={[{id:"datos",icon:"📝",label:"Datos"},{id:"diagnostico",icon:"📊",label:"Diagnóstico"},{id:"flujo",icon:"💧",label:"Flujo de Caja"},{id:"precios",icon:"🏷️",label:"Precios"}]} active={subTab} onChange={setSubTab}/>

      {subTab==="datos"&&(
        <>
          {ventasNum>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
              <KpiCard icon="💰" label="Ventas/mes" value={`$${ventasNum.toLocaleString("es-CL")}`}/>
              <KpiCard icon="📤" label="Costos totales" value={`$${Math.round(totalCostos).toLocaleString("es-CL")}`} color={totalCostos>ventasNum?C.danger:C.text}/>
              <KpiCard icon="📈" label="Utilidad estimada" value={`$${Math.round(utilidad).toLocaleString("es-CL")}`} color={utilidad<0?C.danger:C.success}/>
              <KpiCard icon="%" label="Margen real" value={margenReal!==null?`${margenReal}%`:null} color={margenReal<10?C.danger:margenReal<20?C.warning:C.success}/>
            </div>
          )}
          <div className="card">
            <SectionHeader icon="💰" title="Datos Financieros"><Completeness data={data}/></SectionHeader>
            <DataGrid fields={fields} data={data} onChange={set}/>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
              <button className="btn-primary" onClick={()=>setSaved(true)}>{saved?"✓ Guardado":"💾 Guardar"}</button>
            </div>
          </div>
        </>
      )}

      {subTab!=="datos"&&(
        <div className="card">
          <SectionHeader icon="🤖" title={{diagnostico:"Diagnóstico Financiero",flujo:"Análisis de Flujo de Caja",precios:"Optimización de Precios"}[subTab]}>
            <button className="btn-primary" onClick={()=>analyze(subTab)} disabled={loading}>
              {loading?<><div className="spinner"/>Analizando...</>:<>Analizar con IA</>}
            </button>
          </SectionHeader>
          <AIBox text={output} loading={loading} placeholder={`Ingresa los datos financieros y genera el ${subTab}.`}/>
        </div>
      )}
    </div>
  );
}

function ModuleConsultor({ biz, local }) {
  const [messages,setMessages]=useState([]);

  const bottomRef=useRef(null);
  const localName=local==="almibar"?"Almíbar (Bar, Curicó)":"Pangoa (Restaurante Peruano, Talca)";

  useEffect(()=>{
    setMessages([{role:"assistant",text:`Hola Hector 👋 Soy tu consultor ejecutivo de ${localName}. Tengo acceso a todos los datos que has ingresado del negocio. Puedo ayudarte con cualquier área: finanzas, personas, operaciones, marketing, legal o estrategia. ¿Qué necesitas?`}]);
    setInput("");
  },[local]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const send = async () => {
    if(!input.trim()||loading) return;
    const msg=input.trim(); setInput("");
    setMessages(p=>[...p,{role:"user",text:msg}]);
    setLoading(true);
    const ctx=buildContext(biz,local);

Tienes acceso completo al contexto del negocio:\n${ctx}\n\nEres directo, práctico y hablas en español chileno. Tratas a Hector de "tú". Das respuestas accionables basadas en los datos reales del negocio. Cubres todas las áreas: CEO, marketing, finanzas, RRHH, operaciones, legal y estrategia.`;
    let aiText="";
    setMessages(p=>[...p,{role:"assistant",text:"",streaming:true}]);
    try {
      await claude(sys,msg,t=>{
        aiText=t;
        setMessages(p=>{ const u=[...p]; u[u.length-1]={role:"assistant",text:t,streaming:true}; return u; });
      });
    } catch { aiText="Error al conectar. Intenta nuevamente."; }
    setMessages(p=>{ const u=[...p]; u[u.length-1]={role:"assistant",text:aiText,streaming:false}; return u; });
    setLoading(false);
  };

  const suggestions=[
    "Dame el diagnóstico general del negocio","¿Cuál es mi mayor riesgo hoy?",
    "¿Qué debo hacer primero esta semana?","Ayúdame a mejorar la rentabilidad",
    "¿Cómo gestiono mejor a mi equipo?","Analiza si mis precios son correctos",
  ];

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)",minHeight:500,gap:16}}>
      <div style={{background:C.blueDim,border:`1px solid #C0CFEE`,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>🤖</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.blue}}>Consultor Ejecutivo IA</div>
          <div style={{fontSize:11,color:C.muted}}>Accede a todos los datos del negocio · Responde sobre cualquier área</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant"&&<span style={{fontSize:20,marginRight:8,flexShrink:0,alignSelf:"flex-end",marginBottom:2}}>🤖</span>}
            <div className={m.role==="user"?"chat-bubble-user":"chat-bubble-ai"}>
              {m.text}
              {m.streaming&&m.text&&<span style={{color:C.blueLight}}>▋</span>}
              {m.streaming&&!m.text&&<div className="spinner" style={{display:"inline-block",width:13,height:13}}/>}
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>

      {messages.length<=1&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {suggestions.map((s,i)=><button key={i} className="btn-ghost btn-sm" style={{fontSize:12}} onClick={()=>setInput(s)}>{s}</button>)}
        </div>
      )}

      <div style={{display:"flex",gap:10}}>
        <textarea className="input" rows={2} placeholder="Pregunta sobre cualquier aspecto del negocio..."

        <button className="btn-primary" onClick={send} disabled={loading||!input.trim()} style={{alignSelf:"flex-end"}}>
          {loading?<div className="spinner"/>:"→"}
        </button>

    </div>
  );
}

// ─── MODULE: IMPORTAR ────────────────────────────────────────────────────────
function ModuleImportar({ biz, local, updateBiz, onNavigate }) {
  const [stage, setStage] = useState("upload");
  const [file, setFile] = useState(null);
  const [error, setError] = useState("");
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [applied, setApplied] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  const parseExcel = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const XLSX = window.XLSX;
        if (!XLSX) { resolve("(Excel disponible — SheetJS no cargado en este entorno)"); return; }
        const wb = XLSX.read(e.target.result, { type:"array" });
        let text = "";
        wb.SheetNames.forEach(name => {
          const ws = wb.Sheets[name];
          const csv = XLSX.utils.sheet_to_csv(ws, { blankrows:false });
          if (csv.replace(/,/g,"").trim()) text += `\n=== HOJA: ${name} ===\n${csv}\n`;
        });
        resolve(text.slice(0, 14000));
      } catch(e2) { reject(e2); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });

  const parsePDF = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const extractWithText = async (text, fname) => {
    const localName = local==="almibar" ? "Almíbar (Bar, Curicó)" : "Pangoa (Restaurante Peruano, Talca)";
    const sys = `Eres un asistente que extrae datos de reportes POS/Fudo para un ERP gastronómico. Devuelves SOLO JSON válido sin markdown ni texto adicional.`;
    const prompt = `Analiza este reporte del sistema Fudo para "${localName}". Archivo: ${fname}\n\nDATOS:\n${text}\n\nDevuelve SOLO este JSON (sin markdown, sin texto extra). Si un campo no está en el reporte ponlo null:\n{"resumen":"","periodo":"","finanzas":{"ventasMensual":null,"ventasPromDia":null,"ticketPromedio":null,"costoVentas":null,"margenEstimado":null,"principalIngreso":null,"mesesCriticos":null},"operaciones":{"capacidadMesas":null,"clientesDia":null,"diasOperacion":null,"tiempoServicio":null,"principalesProveedores":null,"desperdicioEstimado":null},"rrhh":{"cantEmpleados":null,"cargos":null},"hallazgos":[],"alertas":[],"recomendaciones":[]}`;
    let result = "";
    await claude(sys, prompt, t => { result = t; });
    return result;
  };

  const extractWithPDF = async (b64, fname) => {
    const localName = local==="almibar" ? "Almíbar (Bar, Curicó)" : "Pangoa (Restaurante Peruano, Talca)";
    const key = window.__ALMA_KEY__;
    if (!key) throw new Error("API key no configurada");
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","x-api-key":key,"anthropic-version":"2023-06-01"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1800,
        system:`Extraes datos de reportes POS para un ERP gastronómico. Devuelves SOLO JSON válido.`,
        messages:[{ role:"user", content:[
          { type:"document", source:{ type:"base64", media_type:"application/pdf", data:b64 }},
          { type:"text", text:`Analiza este reporte de Fudo para "${localName}" (${fname}). Devuelve SOLO JSON sin markdown:\n{"resumen":"","periodo":"","finanzas":{"ventasMensual":null,"ventasPromDia":null,"ticketPromedio":null,"costoVentas":null,"margenEstimado":null,"principalIngreso":null,"mesesCriticos":null},"operaciones":{"capacidadMesas":null,"clientesDia":null,"diasOperacion":null,"tiempoServicio":null,"principalesProveedores":null,"desperdicioEstimado":null},"rrhh":{"cantEmpleados":null,"cargos":null},"hallazgos":[],"alertas":[],"recomendaciones":[]}`}
        ]}]
      })
    });
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    return data.content?.map(b => b.text||"").join("") || "";
  };

  const parseJSON = (text) => {
    try {
      const clean = text.replace(/```json|```/g,"").trim();
      const s = clean.indexOf("{"); const e2 = clean.lastIndexOf("}");
      if (s===-1) return null;
      return JSON.parse(clean.slice(s, e2+1));
    } catch { return null; }
  };

  const handleFile = async (f) => {
    if (!f) return;
    setError("");
    const ext = f.name.split(".").pop().toLowerCase();
    if (!["xlsx","xls","csv","pdf"].includes(ext)) {
      setError("Formato no soportado. Usa Excel (.xlsx, .xls, .csv) o PDF."); return;
    }
    setFile(f); setStage("analyzing"); setLoading(true); setAnalysis(null); setApplied([]);
    try {
      let raw = "";
      if (ext==="pdf") { raw = await extractWithPDF(await parsePDF(f), f.name); }
      else { raw = await extractWithText(await parseExcel(f), f.name); }
      const parsed = parseJSON(raw);
      setAnalysis(parsed || { resumen:"No se pudo extraer datos estructurados. Revisa el formato del archivo.", hallazgos:[], alertas:[], recomendaciones:[], finanzas:{}, operaciones:{}, rrhh:{} });
      setStage("review");
    } catch(e2) {
      setError("Error al procesar: " + e2.message); setStage("upload");
    }
    setLoading(false);
  };

  const applyField = (area, key, val) => {
    if (val===null||val===undefined||String(val).trim()==="") return;
    updateBiz(area, local, key, String(val));
    setApplied(p => [...new Set([...p, `${area}.${key}`])]);
  };

  const applyAll = () => {
    if (!analysis) return;
    ["finanzas","operaciones","rrhh"].forEach(area => {
      if (analysis[area]) Object.entries(analysis[area]).forEach(([k,v]) => applyField(area,k,v));
    });
    setStage("done");
  };

  const reset = () => { setStage("upload"); setFile(null); setError(""); setAnalysis(null); setApplied([]); };

  const FLABELS = {
    finanzas:{ ventasMensual:"Ventas mensuales",ventasPromDia:"Ventas prom/día",ticketPromedio:"Ticket promedio",costoVentas:"Costo ventas %",margenEstimado:"Margen %",principalIngreso:"Principal ingreso",mesesCriticos:"Meses críticos"},
    operaciones:{ capacidadMesas:"Mesas",clientesDia:"Clientes/día",diasOperacion:"Días operación",tiempoServicio:"T° servicio",principalesProveedores:"Proveedores",desperdicioEstimado:"Desperdicio"},
    rrhh:{ cantEmpleados:"N° empleados",cargos:"Cargos"},
  };

  return (
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:20}}>

      <div style={{background:C.blueDim,border:`1px solid #C0CFEE`,borderRadius:12,padding:"16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <span style={{fontSize:24}}>📥</span>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.blue}}>Importar desde Fudo</div>
            <div style={{fontSize:12,color:C.muted}}>Sube un reporte exportado de Fudo — la IA extrae y aplica los datos automáticamente al ERP</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["Reporte de ventas","Cierre de caja","Reporte de productos","Reporte de turnos","Cualquier export de Fudo"].map((t,i) => (
            <span key={i} className="tag tag-blue" style={{fontSize:10}}>✓ {t}</span>
          ))}
        </div>
      </div>

      {stage==="upload" && (
        <>
          <div
            className="card"
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
            onClick={()=>fileRef.current?.click()}
            style={{border:`2px dashed ${dragOver?C.blueLight:C.border}`,background:dragOver?C.blueDim:C.surface,transition:"all .2s",cursor:"pointer",textAlign:"center",padding:"44px 20px"}}
          >
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.pdf" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
            <div style={{fontSize:44,marginBottom:12}}>📂</div>
            <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:6}}>Arrastra tu archivo aquí</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:16}}>o haz clic para seleccionar</div>
            <div style={{display:"flex",justifyContent:"center",gap:10}}>
              <span className="tag tag-green">📊 Excel (.xlsx, .xls, .csv)</span>
              <span className="tag tag-blue">📄 PDF</span>
            </div>
          </div>
          {error&&<div className="alert alert-danger">⚠️ {error}</div>}

          <div className="card">
            <SectionHeader icon="📖" title="¿Cómo exportar desde Fudo?"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                ["📊 Reporte de Ventas","Fudo → Reportes → Ventas → Exportar Excel/PDF"],
                ["🧾 Cierre de Caja","Fudo → Caja → Cierre → Imprimir / Exportar"],
                ["📦 Reporte de Productos","Fudo → Productos → Movimientos → Exportar"],
                ["👤 Reporte de Turnos","Fudo → Personal → Turnos → Exportar Excel"],
              ].map(([t,d])=>(
                <div key={t} style={{padding:"12px 14px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{t}</div>
                  <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{d}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {stage==="analyzing" && (
        <div className="card" style={{textAlign:"center",padding:"48px 20px"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
            <div className="spinner" style={{width:36,height:36,borderWidth:3}}/>
          </div>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>Analizando {file?.name}</div>
          <div style={{fontSize:13,color:C.muted}}>La IA está leyendo el reporte y extrayendo los datos...</div>
        </div>
      )}

      {stage==="review" && analysis && (
        <>
          <div className="card">
            <SectionHeader icon="📋" title={file?.name||"Reporte"}>
              <span className="tag tag-green">✓ Analizado</span>
            </SectionHeader>
            {analysis.resumen&&<div style={{background:C.bg,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13,color:C.text}}><strong>📝 </strong>{analysis.resumen}</div>}
            {analysis.periodo&&<div style={{fontSize:12,color:C.muted,marginBottom:12}}>📅 Período: {analysis.periodo}</div>}
            {analysis.alertas?.length>0&&<div className="alert alert-warn" style={{marginBottom:8}}><span>⚠️</span><div><strong>Alertas:</strong> {analysis.alertas.join(" · ")}</div></div>}
            {analysis.hallazgos?.length>0&&<div className="alert alert-info" style={{marginBottom:8}}><span>💡</span><div><strong>Hallazgos:</strong> {analysis.hallazgos.join(" · ")}</div></div>}
            {analysis.recomendaciones?.length>0&&<div className="alert alert-success"><span>🎯</span><div><strong>Recomendaciones:</strong> {analysis.recomendaciones.join(" · ")}</div></div>}
          </div>

          <div className="card">
            <SectionHeader icon="🔍" title="Campos Extraídos — Revisa antes de aplicar">
              <div style={{display:"flex",gap:8}}>
                <button className="btn-ghost btn-sm" onClick={reset}>Cancelar</button>
                <button className="btn-primary btn-sm" onClick={applyAll}>✓ Aplicar Todo al ERP</button>
              </div>
            </SectionHeader>
            {["finanzas","operaciones","rrhh"].map(area=>{
              const d=analysis[area]; if(!d) return null;
              const filled=Object.entries(d).filter(([,v])=>v!==null&&v!==undefined&&String(v).trim()!=="");
              if(!filled.length) return null;
              return (
                <div key={area} style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>
                    {{finanzas:"💰 Finanzas",operaciones:"⚙️ Operaciones",rrhh:"👥 RRHH"}[area]}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {filled.map(([k,v])=>{
                      const done=applied.includes(`${area}.${k}`);
                      return (
                        <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:done?C.successBg:C.bg,border:`1px solid ${done?"#A0D8B8":C.border}`,borderRadius:8,gap:8}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>{FLABELS[area]?.[k]||k}</div>
                            <div style={{fontSize:13,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(v)}</div>
                          </div>
                          {done
                            ? <span style={{fontSize:16,color:C.success}}>✓</span>
                            : <button className="btn-ghost btn-sm" style={{fontSize:11,padding:"3px 10px",flexShrink:0}} onClick={()=>applyField(area,k,v)}>Aplicar</button>
                          }
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {Object.values(["finanzas","operaciones","rrhh"].reduce((acc,a)=>({...acc,...(analysis[a]||{})}),{})).filter(v=>v!==null&&v!==undefined&&String(v).trim()!=="").length===0&&(
              <div style={{textAlign:"center",padding:"20px",color:C.muted,fontSize:13}}>No se encontraron campos con datos extraíbles en este reporte. Prueba con un reporte de ventas o cierre de caja.</div>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.muted}}>{applied.length} campos aplicados</span>
              <div style={{display:"flex",gap:8}}>
                <button className="btn-ghost btn-sm" onClick={reset}>Subir otro archivo</button>
                <button className="btn-primary" onClick={applyAll}>✓ Aplicar Todo</button>
              </div>
            </div>
          </div>
        </>
      )}

      {stage==="done" && (
        <div className="card" style={{textAlign:"center",padding:"48px 20px"}}>
          <div style={{fontSize:52,marginBottom:14}}>✅</div>
          <div style={{fontSize:16,fontWeight:700,color:C.success,marginBottom:6}}>{applied.length} campos aplicados al ERP</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Los datos de {file?.name} ya están disponibles para todos los análisis de IA</div>
          <div style={{display:"flex",justifyContent:"center",gap:12}}>
            <button className="btn-ghost" onClick={reset}>📥 Importar otro archivo</button>
            <button className="btn-primary" onClick={()=>onNavigate("ceo")}>📊 Ver Dashboard CEO</button>
          </div>
        </div>
      )}
    </div>
  );
}

const NAV = [
  { group:"Dirección", items:[
    {id:"ceo",icon:"📊",label:"Dashboard CEO"},
    {id:"estrategia",icon:"🧭",label:"Estrategia"},
  ]},
  { group:"Negocio", items:[
    {id:"local",icon:"🏪",label:"Mi Local"},
    {id:"marketing",icon:"📣",label:"Marketing"},
    {id:"finanzas",icon:"💰",label:"Finanzas"},
  ]},
  { group:"Organización", items:[
    {id:"rrhh",icon:"👥",label:"RRHH"},
    {id:"operaciones",icon:"⚙️",label:"Operaciones"},
    {id:"legal",icon:"⚖️",label:"Legal"},
  ]},
  { group:"Datos", items:[
    {id:"importar",icon:"📥",label:"Importar Fudo"},
  ]},
  { group:"IA", items:[
    {id:"consultor",icon:"🤖",label:"Consultor IA"},
  ]},
];

const MODULE_COMPONENTS = {
  ceo:ModuleCEO, local:ModuleLocal, marketing:ModuleMarketing,
  finanzas:ModuleFinanzas, rrhh:ModuleRRHH, operaciones:ModuleOperaciones,
  legal:ModuleLegal, estrategia:ModuleEstrategia, consultor:ModuleConsultor,
  importar:ModuleImportar,
};
const MODULE_LABELS = {
  ceo:"Dashboard CEO",local:"Mi Local",marketing:"Marketing",finanzas:"Finanzas",
  rrhh:"RRHH",operaciones:"Operaciones",legal:"Legal",estrategia:"Estrategia",consultor:"Consultor IA",importar:"Importar Fudo"
};
const MODULE_ICONS = {
  ceo:"📊",local:"🏪",marketing:"📣",finanzas:"💰",
  rrhh:"👥",operaciones:"⚙️",legal:"⚖️",estrategia:"🧭",consultor:"🤖",importar:"📥"
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [local,setLocal]=useState("almibar");
  const [module,setModule]=useState("ceo");
  const [biz,setBiz]=useState(INITIAL_BIZ);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("alma_api_key")||"");
  const [showKeyInput,setShowKeyInput]=useState(()=>!localStorage.getItem("alma_api_key"));

  // Load SheetJS for Excel parsing
  useEffect(()=>{
    if (!window.XLSX) {
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      document.head.appendChild(s);
    }
  },[]);

  const updateBiz = useCallback((area,localId,key,value)=>{
    setBiz(p=>({ ...p, [area]:{ ...p[area], [localId]:{ ...p[area][localId], [key]:value } } }));
  },[]);

  const ActiveComp = MODULE_COMPONENTS[module];
  const onNavigate = (mod) => setModule(mod);
  const localName = local==="almibar"?"Almíbar":"Pangoa";
  const localSub  = local==="almibar"?"Bar · Curicó":"Restaurante · Talca";

  // Alert count
  const legalData=biz.legal[local];
  const alerts=[legalData.multasPendientes,legalData.licenciaAlcohol==="Vencida",legalData.patenteComercial==="Vencida",legalData.situacionTributaria==="Con deuda SII"].filter(Boolean).length;

  const totalCompleteness = ["locales","finanzas","rrhh","operaciones","legal","estrategia"].reduce((acc,k)=>acc+countFilled(biz[k][local]),0);
  const totalFields2 = ["locales","finanzas","rrhh","operaciones","legal","estrategia"].reduce((acc,k)=>acc+totalFields(biz[k][local]),0);
  const completePct = totalFields2>0?Math.round(totalCompleteness/totalFields2*100):0;

  return (
    <>
      <style>{css}</style>
      <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>

        {/* SIDEBAR */}
        <div style={{width:220,flexShrink:0,background:C.sidebar,display:"flex",flexDirection:"column",padding:"0 8px 16px"}}>
          {/* Logo */}
          <div style={{padding:"20px 12px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.35)",letterSpacing:".14em",textTransform:"uppercase",marginBottom:4}}>ERP · IA</div>
            <div style={{fontSize:17,fontWeight:700,color:"#fff",fontFamily:"'Lora',serif",fontStyle:"italic"}}>Inversiones Alma</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:1}}>SpA · Panel de Gestión</div>
          </div>

          {/* Local switcher */}
          <div style={{padding:"0 4px",marginBottom:8}}>
            <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,.3)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:6,paddingLeft:8}}>Local</div>
            <button className={`local-btn ${local==="almibar"?"active":""}`} onClick={()=>setLocal("almibar")}>
              <span>🍸</span><div><div style={{fontWeight:600}}>Almíbar</div><div style={{fontSize:10,opacity:.6}}>Bar · Curicó</div></div>
            </button>
            <button className={`local-btn ${local==="pangoa"?"active":""}`} onClick={()=>setLocal("pangoa")} style={{marginTop:4}}>
              <span>🇵🇪</span><div><div style={{fontWeight:600}}>Pangoa</div><div style={{fontSize:10,opacity:.6}}>Restaurante · Talca</div></div>
            </button>
            {/* completeness */}
            <div style={{padding:"8px 8px 0"}}>
              <div style={{height:3,background:"rgba(255,255,255,.1)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",background:C.sidebarActive,width:`${completePct}%`,borderRadius:2,transition:"width .5s"}}/>
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,.3)",marginTop:4}}>{completePct}% de datos completados</div>
            </div>
          </div>

          <div style={{height:1,background:"rgba(255,255,255,.08)",margin:"8px 4px"}}/>

          {/* Navigation */}
          <nav style={{flex:1,overflowY:"auto"}}>
            {NAV.map(group=>(
              <div key={group.group}>
                <div className="nav-group-label">{group.group}</div>
                {group.items.map(item=>(
                  <button key={item.id} className={`nav-item ${module===item.id?"active":""}`} onClick={()=>setModule(item.id)}>
                    <span style={{fontSize:14,flexShrink:0}}>{item.icon}</span>
                    <span>{item.label}</span>
                    {item.id==="legal"&&alerts>0&&<span style={{marginLeft:"auto",background:"#D84040",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10}}>{alerts}</span>}
                  </button>
                ))}
              </div>
            ))}
          </nav>

          <div style={{padding:"12px 8px 0",borderTop:"1px solid rgba(255,255,255,.08)",marginTop:8}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,.25)",lineHeight:1.8}}>
              <div>Inversiones Alma SpA</div>
              <div>Almíbar · Pangoa</div>
            </div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {/* Header */}
          {/* API KEY MODAL */}
          {showKeyInput && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(10,22,40,0.7)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"#fff",borderRadius:16,padding:"32px 36px",width:480,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
                <div style={{fontSize:32,marginBottom:12,textAlign:"center"}}>🔑</div>
                <h2 style={{fontSize:18,fontWeight:700,color:"#0A1628",textAlign:"center",marginBottom:8}}>Configurar API Key</h2>
                <p style={{fontSize:13,color:"#6B7EA8",textAlign:"center",marginBottom:24,lineHeight:1.6}}>
                  Necesitas una API Key de Anthropic para usar la IA.<br/>
                  Obtén una en <a href="https://console.anthropic.com" target="_blank" style={{color:"#1A3A8A"}}>console.anthropic.com</a> → API Keys
                </p>
                <label style={{fontSize:11,fontWeight:700,color:"#4A5878",textTransform:"uppercase",letterSpacing:".08em",display:"block",marginBottom:6}}>Tu API Key</label>
                <input
                  id="apiKeyInput"
                  type="password"
                  placeholder="sk-ant-api03-..."
                  style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"2px solid #D0DBF0",fontFamily:"monospace",fontSize:13,outline:"none",marginBottom:16,boxSizing:"border-box"}}
                  onFocus={e=>{e.target.style.borderColor="#2952C8";}}
                  onBlur={e=>{e.target.style.borderColor="#D0DBF0";}}
                />
                <button
                  onClick={()=>{
                    const v=document.getElementById("apiKeyInput").value.trim();
                    if(v.startsWith("sk-")){
                      setApiKey(v);
                      window.__ALMA_KEY__=v;
                      localStorage.setItem("alma_api_key",v);
                      setShowKeyInput(false);
                    } else {
                      alert("La clave debe comenzar con sk-ant-...");
                    }
                  }}
                  style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#1A3A8A,#2952C8)",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
                  Guardar y continuar →
                </button>
                <p style={{fontSize:11,color:"#8A9EC0",textAlign:"center",marginTop:12}}>
                  🔒 Se guarda solo en tu navegador, nunca en ningún servidor
                </p>
              </div>
            </div>
          )}
          <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,background:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{MODULE_ICONS[module]}</span>
                <h1 style={{fontSize:17,fontWeight:700,color:C.text}}>{MODULE_LABELS[module]}</h1>
              </div>
              <p style={{fontSize:11,color:C.muted,marginTop:2}}>
                <span style={{fontWeight:600,color:C.blue}}>{localName}</span>
                <span style={{margin:"0 6px",color:C.border}}>·</span>
                <span>{localSub}</span>
                <span style={{margin:"0 6px",color:C.border}}>·</span>
                <span>{completePct}% datos completados</span>
              </p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {alerts>0&&<span className="tag tag-danger">⚠️ {alerts} alerta{alerts>1?"s":""} legal{alerts>1?"es":""}</span>}
              {apiKey
                ? <span className="tag tag-green" style={{cursor:"pointer"}} onClick={()=>setShowKeyInput(true)} title="Cambiar API Key"><span style={{width:6,height:6,borderRadius:"50%",background:C.success,display:"inline-block"}}/>IA activa</span>
                : <span className="tag tag-danger" style={{cursor:"pointer"}} onClick={()=>setShowKeyInput(true)}>⚠️ Sin API Key</span>
              }
              <span className="tag tag-blue">{local==="almibar"?"🍸":"🇵🇪"} {localName}</span>
            </div>
          </div>

          {/* Content */}
          <div style={{flex:1,overflowY:"auto",padding:"22px 28px"}}>
            {ActiveComp&&<ActiveComp key={`${module}-${local}`} biz={biz} local={local} updateBiz={updateBiz} onNavigate={onNavigate}/>}
          </div>
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
